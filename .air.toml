#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/lantern ./cmd/lantern"
  entrypoint = ["./tmp/lantern"]
  include_ext = ["go"]
  exclude_dir = ["tmp", "web", "vendor"]
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  delay = 300
  send_interrupt = true
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true

